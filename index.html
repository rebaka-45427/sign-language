<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SignSense – Real-Time ASL Detection</title>

<!-- MediaPipe Hands (pinned CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════════
   CSS DESIGN SYSTEM
   ═══════════════════════════════════════════ */
:root{
  --bg:#07090f;
  --surface:#0e1120;
  --surface2:#141828;
  --surface3:#1a1f30;
  --border:#1e2538;
  --border2:#2a3050;
  --accent:#4f8ef7;
  --accent-glow:rgba(79,142,247,0.22);
  --accent2:#a78bfa;
  --accent3:#34d399;
  --warn:#f59e0b;
  --danger:#f87171;
  --text:#e8eaf6;
  --text2:#8b93b8;
  --text3:#4a5180;
  --card:#0f1220;
  --radius:16px;
  --radius-sm:10px;
  --font-head:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  /* Confidence color states */
  --conf-hi:#34d399;
  --conf-mid:#4f8ef7;
  --conf-lo:#f59e0b;
  --conf-vlo:#f87171;
}

/* High Contrast Theme */
.hc{
  --bg:#000;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --border:#444;--border2:#666;
  --accent:#ffe600;--accent2:#ff6bff;--accent3:#00ffb3;
  --text:#fff;--text2:#ddd;--text3:#aaa;--card:#111;
  --accent-glow:rgba(255,230,0,0.2);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden}
#root{height:100%}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── LAYOUT ──────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;gap:2px;z-index:10;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);min-height:52px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px 18px;overflow-x:hidden}

/* ── SIDEBAR ─────────────────────────────── */
.logo{display:flex;align-items:center;gap:9px;margin-bottom:16px;padding:0 4px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-family:var(--font-head);font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo-text span{color:var(--accent)}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;padding:8px 8px 3px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--radius-sm);cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font-body);font-size:13px;font-weight:500;width:100%;text-align:left;transition:all .13s;position:relative}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--accent-glow);color:var(--accent)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;background:var(--accent);border-radius:2px}
.nav-btn .ni{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;font-size:10px;font-weight:700;border-radius:20px;padding:1px 6px}
.nbadge.g{background:var(--accent3);color:#000}
.nbadge.b{background:var(--accent);color:#fff}
.nbadge.r{background:var(--danger);color:#fff}

/* ── TOPBAR ──────────────────────────────── */
.tb-title{font-family:var(--font-head);font-size:16px;font-weight:700}
.tb-sub{font-size:10px;color:var(--text3);margin-top:1px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;white-space:nowrap}
.pill.live{border-color:var(--accent3);color:var(--accent3)}
.pill.detect{border-color:var(--accent);color:var(--accent)}
.pill.warn{border-color:var(--warn);color:var(--warn)}
.pill.fps{border-color:var(--accent2);color:var(--accent2);font-variant-numeric:tabular-nums;min-width:70px}

/* ── CAMERA AREA ─────────────────────────── */
.cam-wrap{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;
  border:2px solid var(--border);display:flex;align-items:center;justify-content:center;
  width:100%;min-height:280px}
.cam-wrap video,.cam-wrap canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;transform:scaleX(-1)}
.cam-wrap canvas{pointer-events:none}
.cam-off{display:flex;flex-direction:column;align-items:center;gap:10px;
  color:var(--text3);font-size:13px;z-index:2;text-align:center;padding:20px}
.cam-off .oi{font-size:44px}
.cam-hud{position:absolute;top:10px;left:10px;right:10px;
  display:flex;justify-content:space-between;align-items:flex-start;z-index:5;pointer-events:none}
.hud-badge{background:rgba(0,0,0,.75);border:1px solid var(--border2);border-radius:7px;
  padding:3px 9px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.hud-right{display:flex;flex-direction:column;gap:4px;align-items:flex-end}

/* No-hand overlay message */
.no-hand-msg{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  background:rgba(245,158,11,.18);border:1px solid var(--warn);
  border-radius:8px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--warn);
  z-index:6;pointer-events:none;white-space:nowrap}

/* Lighting warning */
.light-warn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(248,113,113,.15);border:1px solid var(--danger);border-radius:12px;
  padding:10px 18px;font-size:12px;font-weight:600;color:var(--danger);
  z-index:6;pointer-events:none;text-align:center}

.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.cam-ctrls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5}
.cc-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .13s}
.cc-primary{background:var(--accent);color:#fff}
.cc-primary:hover{transform:scale(1.09)}
.cc-secondary{background:rgba(0,0,0,.7);color:var(--text);border:1px solid var(--border2)}
.cc-secondary:hover{background:var(--surface2)}
.cc-danger{background:rgba(248,113,113,.2);color:var(--danger);border:1px solid var(--danger)}

/* ── OUTPUT DISPLAY ──────────────────────── */
.big-out{background:linear-gradient(135deg,var(--surface2),var(--card));
  border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;
  text-align:center;position:relative;overflow:hidden}
.big-out::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,var(--accent-glow),transparent 65%);pointer-events:none}

/* Dynamic letter color based on confidence */
.big-letter{font-family:var(--font-head);font-size:86px;font-weight:800;line-height:1;
  transition:color .2s,text-shadow .2s}
.big-letter.conf-hi{color:var(--conf-hi);text-shadow:0 0 32px rgba(52,211,153,.5)}
.big-letter.conf-mid{color:var(--conf-mid);text-shadow:0 0 32px rgba(79,142,247,.45)}
.big-letter.conf-lo{color:var(--conf-lo);text-shadow:0 0 20px rgba(245,158,11,.35)}
.big-letter.conf-vlo{color:var(--conf-vlo);text-shadow:0 0 16px rgba(248,113,113,.3)}
.big-letter.conf-none{color:var(--text3);text-shadow:none}

.conf-wrap{margin-top:10px}
.conf-row{font-size:11px;color:var(--text3);display:flex;justify-content:space-between;margin-bottom:3px}
.conf-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.conf-fill{height:100%;border-radius:4px;transition:width .15s,background .2s}

/* FPS counter */
.fps-counter{font-family:var(--font-head);font-size:11px;font-weight:700;
  font-variant-numeric:tabular-nums;letter-spacing:.5px}

/* ── CARDS ───────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.ctitle{font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--text2);
  letter-spacing:.3px;margin-bottom:11px;display:flex;align-items:center;gap:6px}

/* ── WORD BUILDER ────────────────────────── */
.word-chips{display:flex;flex-wrap:wrap;gap:5px;min-height:34px;align-items:center}
.wchip{background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  padding:4px 10px;font-size:14px;font-weight:600;font-family:var(--font-head);
  cursor:pointer;transition:all .12s}
.wchip:hover{border-color:var(--danger);color:var(--danger)}
.wchip.cur{border-color:var(--accent);color:var(--accent)}
.wchip.space-chip{border-style:dashed;color:var(--text3);font-size:10px}
.sugg-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.sugg-btn{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(167,139,250,.1);border:1px solid var(--accent2);color:var(--accent2);
  cursor:pointer;transition:all .12s;font-family:var(--font-body)}
.sugg-btn:hover{background:var(--accent2);color:#fff}

/* ── HISTORY ─────────────────────────────── */
.hist-list{display:flex;flex-direction:column;gap:4px;max-height:190px;overflow-y:auto}
.hist-item{display:flex;align-items:center;gap:9px;padding:6px 10px;
  background:var(--surface2);border-radius:var(--radius-sm);font-size:12px}
.hist-item .hl{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--accent);width:24px}
.hist-t{margin-left:auto;color:var(--text3);font-size:10px}

/* ── CHAT ────────────────────────────────── */
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;height:calc(100vh - 120px)}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:12px;min-height:0}
.msg{max-width:82%;display:flex;flex-direction:column;gap:2px}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.them{align-self:flex-start}
.msg-bub{padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5}
.msg.me .msg-bub{background:var(--accent);color:#fff;border-bottom-right-radius:3px}
.msg.them .msg-bub{background:var(--surface2);border-bottom-left-radius:3px}
.msg-meta{font-size:10px;color:var(--text3)}
.chat-in-row{display:flex;gap:7px;padding:10px;border-top:1px solid var(--border)}
.chat-in{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 12px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border .12s}
.chat-in:focus{border-color:var(--accent)}

/* ── LEARN ───────────────────────────────── */
.learn-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.score-row{display:flex;gap:9px}
.score-box{flex:1;background:var(--surface2);border-radius:var(--radius-sm);
  border:1px solid var(--border);padding:12px;text-align:center}
.score-n{font-family:var(--font-head);font-size:30px;font-weight:800;color:var(--accent)}
.score-l{font-size:10px;color:var(--text3);margin-top:2px}
.ab-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
.ab-btn{aspect-ratio:1;border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-family:var(--font-head);font-size:15px;font-weight:700;
  cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;position:relative}
.ab-btn:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.06)}
.ab-btn.done{background:rgba(52,211,153,.12);border-color:var(--accent3);color:var(--accent3)}
.ab-btn.cur{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);
  box-shadow:0 0 14px var(--accent-glow)}
.ab-btn .star{position:absolute;top:1px;right:2px;font-size:7px}
.fb-box{padding:13px 16px;border-radius:var(--radius);font-size:17px;font-weight:700;
  font-family:var(--font-head);text-align:center;transition:all .22s}
.fb-ok{background:rgba(52,211,153,.15);border:1px solid var(--accent3);color:var(--accent3)}
.fb-no{background:rgba(248,113,113,.15);border:1px solid var(--danger);color:var(--danger)}
.fb-wait{background:var(--surface2);border:1px solid var(--border);color:var(--text3)}

/* ── CAPTIONS ────────────────────────────── */
.cap-area{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);
  padding:20px;min-height:100px;font-size:24px;font-weight:600;line-height:1.5;
  color:var(--text);font-family:var(--font-head)}
.cap-ph{color:var(--text3);font-size:13px;font-weight:400;font-family:var(--font-body)}
.tr-box{background:var(--surface);border-radius:var(--radius);padding:13px;
  max-height:240px;overflow-y:auto;font-size:12px;line-height:1.8;border:1px solid var(--border)}
.tr-line{padding:3px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.tr-line span{color:var(--text3);font-size:10px;margin-right:7px}

/* ── SIGN REFERENCE ──────────────────────── */
.sign-ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:5px}
.sign-ref-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:6px 4px;text-align:center;cursor:pointer;transition:all .11s;font-size:9px}
.sign-ref-item:hover{border-color:var(--accent);transform:scale(1.06)}
.sign-ref-item .sl{font-family:var(--font-head);font-size:17px;font-weight:800;color:var(--accent)}
.sign-ref-item .sd{font-size:15px}

/* ── TRAINING ────────────────────────────── */
.sample-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.sth{aspect-ratio:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;transition:all .12s}
.sth.cap{border-color:var(--accent3);background:rgba(52,211,153,.1)}
.sth:hover{border-color:var(--accent)}

/* ── SETTINGS ────────────────────────────── */
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.set-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border)}
.set-lbl{font-size:13px;font-weight:500}
.set-sub{font-size:10px;color:var(--text3);margin-top:1px}
.toggle{width:40px;height:21px;border-radius:11px;background:var(--border);border:none;
  cursor:pointer;position:relative;transition:background .16s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:15px;height:15px;
  border-radius:50%;background:#fff;transition:transform .16s}
.toggle.on::after{transform:translateX(19px)}

/* ── UTIL CLASSES ────────────────────────── */
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-family:var(--font-body);font-size:13px;font-weight:600;transition:all .12s;
  display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{opacity:.88;transform:translateY(-1px)}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-s:hover{border-color:var(--accent);color:var(--accent)}
.btn-d{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid var(--danger)}
.btn-g{background:var(--accent3);color:#000}
.btn-sm{padding:4px 11px;font-size:11px}
.row{display:flex;align-items:center;gap:8px}
.col{display:flex;flex-direction:column;gap:9px}
.sp{flex:1}
.hr{border:none;border-top:1px solid var(--border);margin:6px 0}

/* Pulse animation */
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--accent3);box-shadow:0 0 0 0 rgba(52,211,153,.4);animation:pulseA 1.5s infinite}
@keyframes pulseA{0%{box-shadow:0 0 0 0 rgba(52,211,153,.4)}
  70%{box-shadow:0 0 0 9px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}

/* Alert toast */
.alert-pop{position:fixed;top:16px;right:16px;z-index:9999;border-radius:var(--radius);
  padding:13px 16px;font-weight:700;font-family:var(--font-head);font-size:15px;
  box-shadow:0 8px 28px rgba(0,0,0,.45);display:flex;align-items:center;gap:9px;
  animation:slideIn .22s ease;cursor:pointer}
.alert-pop.warn{background:var(--warn);color:#000}
.alert-pop.danger{background:var(--danger);color:#fff}
.alert-pop.ok{background:var(--accent3);color:#000}
@keyframes slideIn{from{transform:translateX(110%)}to{transform:translateX(0)}}

/* Detect layout */
.detect-grid{display:grid;grid-template-columns:1fr 300px;gap:13px}
.out-panel{display:flex;flex-direction:column;gap:9px}

/* Debug panel */
.debug-panel{background:rgba(0,0,0,.6);border:1px solid var(--border2);border-radius:8px;
  padding:8px 10px;font-size:10px;font-family:monospace;color:var(--text2);
  max-height:100px;overflow-y:auto;line-height:1.7}

/* MediaPipe loading overlay */
.mp-loading{position:absolute;inset:0;background:rgba(7,9,15,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:10;border-radius:var(--radius)}
.mp-spinner{width:34px;height:34px;border:3px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mp-loading-text{font-size:12px;color:var(--text2);font-family:var(--font-head);font-weight:600}

/* Backspace button */
.backspace-btn{background:rgba(248,113,113,.12);border:1px solid var(--danger);
  color:var(--danger);border-radius:6px;padding:2px 8px;font-size:10px;
  cursor:pointer;transition:all .12s;font-family:var(--font-body)}
.backspace-btn:hover{background:var(--danger);color:#fff}

/* Space button */
.space-btn{background:rgba(79,142,247,.1);border:1px solid var(--accent);
  color:var(--accent);border-radius:6px;padding:2px 8px;font-size:10px;
  cursor:pointer;transition:all .12s;font-family:var(--font-body)}
.space-btn:hover{background:var(--accent);color:#fff}

/* Responsive */
@media(max-width:900px){
  .sidebar{width:52px;min-width:52px}
  .logo-text,.nav-btn span,.nav-sec{display:none}
  .nav-btn{justify-content:center}
  .detect-grid,.conv-grid,.learn-grid,.set-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>

<!-- ═══════════════════════════════════════════════════════════════
     SIGN ENGINE v2 — Production-Grade ASL Landmark Recogniser
     
     FIX LOG:
     1. Full landmark normalisation using palm width & height
     2. Improved finger extension: uses angle-based logic, not just Y
     3. Thumb detection: accounts for both left and right hands
     4. Landmark smoothing: 5-frame moving average to reduce jitter
     5. Confidence scoring: multi-factor, more granular
     6. Resolved M/N confusion, U/V ambiguity, 6/7/8/9 overlap
     7. Clean modular structure, easy to extend
     ═══════════════════════════════════════════════════════════════ -->
<script>
window.SignEngine = (function () {
  'use strict';

  /* ── Smoothing Buffer ────────────────────────────────────────────────
     Maintains per-landmark moving average over last SMOOTH_N frames.
     Dramatically reduces jitter from MediaPipe tracking noise.
  */
  const SMOOTH_N = 4;
  const smoothBuf = []; // ring buffer of landmark arrays

  function smoothLandmarks(lm) {
    // Deep-copy current landmarks into the buffer
    smoothBuf.push(lm.map(p => ({ x: p.x, y: p.y, z: p.z })));
    if (smoothBuf.length > SMOOTH_N) smoothBuf.shift();

    // Average across all buffered frames
    const n = smoothBuf.length;
    return lm.map((_, i) => ({
      x: smoothBuf.reduce((s, f) => s + f[i].x, 0) / n,
      y: smoothBuf.reduce((s, f) => s + f[i].y, 0) / n,
      z: smoothBuf.reduce((s, f) => s + f[i].z, 0) / n,
    }));
  }

  /* ── Geometry Helpers ────────────────────────────────────────────── */
  function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
  }

  // Palm width (knuckle-to-knuckle: index MCP to pinky MCP)
  function palmWidth(lm) { return dist(lm[5], lm[17]); }

  // Palm height (wrist to middle MCP)
  function palmHeight(lm) { return dist(lm[0], lm[9]); }

  /* ── Improved Finger Extension ───────────────────────────────────────
     FIX: Uses three-point angle check instead of simple Y comparison.
     More robust across different hand orientations and sizes.
  */
  function dotProduct(v1, v2) {
    return v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
  }

  function fingerAngle(a, b, c) {
    // Angle at point b between segments b→a and b→c
    const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
    const mag1 = Math.hypot(v1.x, v1.y, v1.z);
    const mag2 = Math.hypot(v2.x, v2.y, v2.z);
    if (mag1 === 0 || mag2 === 0) return 0;
    const cos = Math.max(-1, Math.min(1, dotProduct(v1, v2) / (mag1 * mag2)));
    return Math.acos(cos) * (180 / Math.PI);
  }

  function isFingerExtended(lm, tip, dip, pip, mcp) {
    // FIX: Angle at PIP joint. Extended fingers have straighter angle (>130°).
    // Also verify tip is beyond mcp in palm-relative direction.
    const angle = fingerAngle(lm[tip], lm[pip], lm[mcp]);
    const tipBeyondPip = lm[tip].y < lm[pip].y;
    const tipBeyondMcp = lm[tip].y < lm[mcp].y;
    return angle > 130 || (tipBeyondPip && tipBeyondMcp);
  }

  function isFingerCurled(lm, tip, pip, mcp) {
    // Strongly curled: tip is at or below MCP level
    return lm[tip].y >= lm[mcp].y - 0.01;
  }

  /* ── Thumb Detection ─────────────────────────────────────────────────
     FIX: MediaPipe returns "Left"/"Right" from camera perspective.
     For selfie/mirrored view, handedness is flipped. We detect based
     on geometry rather than trusting the label blindly.
  */
  function isThumbExtended(lm, handedness) {
    const pw = palmWidth(lm);
    // Use distance from thumb tip to index MCP — extended thumb is far
    const thumbToIdxMcp = dist(lm[4], lm[5]) / pw;
    // Also check thumb tip is far from palm center (lm[9])
    const thumbToCenter = dist(lm[4], lm[9]) / pw;
    return thumbToIdxMcp > 0.6 || thumbToCenter > 0.8;
  }

  /* ── Normalised Distances ────────────────────────────────────────── */
  function nd(lm, a, b) {
    // Normalised distance: divide by palm width
    return dist(lm[a], lm[b]) / palmWidth(lm);
  }

  /* ── Main Finger State ───────────────────────────────────────────── */
  function getFingers(lm, handedness) {
    return {
      thumb: isThumbExtended(lm, handedness),
      idx:   isFingerExtended(lm, 8, 7, 6, 5),
      mid:   isFingerExtended(lm, 12, 11, 10, 9),
      ring:  isFingerExtended(lm, 16, 15, 14, 13),
      pin:   isFingerExtended(lm, 20, 19, 18, 17),
      // Curl helpers for finer distinctions
      idxCurled:  isFingerCurled(lm, 8, 6, 5),
      midCurled:  isFingerCurled(lm, 12, 10, 9),
      ringCurled: isFingerCurled(lm, 16, 14, 13),
      pinCurled:  isFingerCurled(lm, 20, 18, 17),
    };
  }

  /* ── Core Recogniser ─────────────────────────────────────────────── */
  function recognize(rawLm, handedness) {
    // Step 1: Smooth landmarks to reduce jitter
    const lm = smoothLandmarks(rawLm);
    const f  = getFingers(lm, handedness);
    const pw = palmWidth(lm);

    // Normalised tip-to-tip distances
    const td48  = nd(lm, 4, 8);   // thumb → index tip
    const td412 = nd(lm, 4, 12);  // thumb → middle tip
    const td416 = nd(lm, 4, 16);  // thumb → ring tip
    const td420 = nd(lm, 4, 20);  // thumb → pinky tip
    const d812  = nd(lm, 8, 12);  // index  → middle tip
    const d816  = nd(lm, 8, 16);  // index  → ring tip
    const d1216 = nd(lm, 12, 16); // middle → ring tip
    const d1620 = nd(lm, 16, 20); // ring   → pinky tip

    // Thumb tip height relative to index MCP (useful for A/S/T/M/N/E)
    const thumbAboveIdxMcp = lm[4].y < lm[5].y;
    const thumbAboveIdxPip = lm[4].y < lm[6].y;

    // ─── Numbers ──────────────────────────────────────────────────
    // FIX: Numbers checked first — they share many configurations with letters

    // 0: O-shape — all curled, tips close to thumb tip
    if (!f.idx && !f.mid && !f.ring && !f.pin &&
        td48 < 0.5 && td412 < 0.55 && td48 > 0.08)
      return { letter: '0', conf: 0.87 };

    // 1: Only index up, others tightly curled
    if (f.idx && f.idxCurled === false && !f.mid && !f.ring && !f.pin && !f.thumb)
      return { letter: '1', conf: 0.91 };

    // 2: Index + middle extended, spread apart (V-shape)
    if (f.idx && f.mid && !f.ring && !f.pin && d812 > 0.18)
      return { letter: '2', conf: 0.87 };

    // 3: Index + middle + ring up, pinky down
    if (f.idx && f.mid && f.ring && !f.pin)
      return { letter: '3', conf: 0.86 };

    // 4: All four fingers up, thumb folded
    if (f.idx && f.mid && f.ring && f.pin && !f.thumb)
      return { letter: '4', conf: 0.88 };

    // 5: All five open
    if (f.idx && f.mid && f.ring && f.pin && f.thumb)
      return { letter: '5', conf: 0.90 };

    // FIX: 6/7/8/9 — use thumb-to-finger distances more carefully
    // 6: Ring+pinky down, thumb touches pinky tip
    if (f.idx && f.mid && !f.ring && !f.pin && td420 < 0.42)
      return { letter: '6', conf: 0.82 };

    // 7: Index+ring up, thumb touches middle
    if (f.idx && !f.mid && f.ring && f.pin && td412 < 0.40)
      return { letter: '7', conf: 0.81 };

    // 8: Middle+ring+pinky up, thumb touches index
    if (!f.idx && f.mid && f.ring && f.pin && td48 < 0.40)
      return { letter: '8', conf: 0.82 };

    // 9: Only pinky up, thumb near index tip
    if (!f.idx && !f.mid && !f.ring && f.pin && td48 < 0.42)
      return { letter: '9', conf: 0.81 };

    // ─── Letters ──────────────────────────────────────────────────

    // A: Fist, thumb rests to side (NOT over fingers)
    // FIX: thumb above index PIP distinguishes A from S
    if (!f.idx && !f.mid && !f.ring && !f.pin && thumbAboveIdxPip && td48 > 0.35)
      return { letter: 'A', conf: 0.84 };

    // B: All four fingers extended, thumb folded across palm
    if (f.idx && f.mid && f.ring && f.pin && !f.thumb && lm[4].x < lm[5].x + pw * 0.15)
      return { letter: 'B', conf: 0.86 };

    // C: All fingers curved in C-shape, open gap
    if (!f.idx && !f.mid && !f.ring && !f.pin && td48 > 0.45 && td48 < 0.80 &&
        td412 > 0.4 && td412 < 0.80)
      return { letter: 'C', conf: 0.79 };

    // D: Index up, other three curl to touch thumb
    if (f.idx && !f.mid && !f.ring && !f.pin && td412 < 0.48 && td416 < 0.5)
      return { letter: 'D', conf: 0.82 };

    // E: All fingers curled tightly to palm
    if (f.idxCurled && f.midCurled && f.ringCurled && f.pinCurled &&
        lm[8].y > lm[5].y && lm[12].y > lm[9].y)
      return { letter: 'E', conf: 0.80 };

    // F: Index+thumb pinch, middle/ring/pinky up
    if (!f.idx && f.mid && f.ring && f.pin && td48 < 0.36)
      return { letter: 'F', conf: 0.82 };

    // G: Index points sideways (horizontal), thumb parallel
    // FIX: check horizontal alignment of index tip vs MCP
    if (f.idx && !f.mid && !f.ring && !f.pin &&
        Math.abs(lm[8].y - lm[5].y) < 0.09 && !f.thumb)
      return { letter: 'G', conf: 0.77 };

    // H: Index + middle horizontal, together
    if (f.idx && f.mid && !f.ring && !f.pin &&
        Math.abs(lm[8].y - lm[0].y) > 0.04 && d812 < 0.16)
      return { letter: 'H', conf: 0.77 };

    // I: Only pinky up, rest folded
    if (!f.idx && !f.mid && !f.ring && f.pin && !f.thumb)
      return { letter: 'I', conf: 0.87 };

    // K: Index + middle up, thumb pointing up between them
    if (f.idx && f.mid && !f.ring && !f.pin && f.thumb && d812 < 0.22)
      return { letter: 'K', conf: 0.77 };

    // L: Index up + thumb extended (L-shape)
    if (f.idx && !f.mid && !f.ring && !f.pin && f.thumb && td48 > 0.6)
      return { letter: 'L', conf: 0.87 };

    // FIX: M vs N disambiguation
    // M: Three fingers folded over thumb, thumb visible under all three
    // N: Two fingers folded over thumb
    // Key: count how many finger tips are BELOW wrist level vs thumb
    {
      const tipsBelowThumb = [lm[8], lm[12], lm[16]].filter(p => p.y > lm[4].y).length;
      if (!f.idx && !f.mid && !f.ring && !f.pin) {
        if (tipsBelowThumb >= 3 && !thumbAboveIdxMcp)
          return { letter: 'M', conf: 0.74 };
        if (tipsBelowThumb === 2 && !thumbAboveIdxMcp)
          return { letter: 'N', conf: 0.73 };
      }
    }

    // O: All finger tips meet thumb tip in circle
    if (!f.idx && !f.mid && !f.ring && !f.pin &&
        td48 < 0.42 && td412 < 0.45 && td48 > 0.10)
      return { letter: 'O', conf: 0.82 };

    // R: Index + middle crossed (overlapping)
    if (f.idx && f.mid && !f.ring && !f.pin && d812 < 0.12)
      return { letter: 'R', conf: 0.79 };

    // S: Tight fist, thumb crosses OVER fingers
    if (!f.idx && !f.mid && !f.ring && !f.pin &&
        !thumbAboveIdxPip && lm[4].y < lm[8].y && lm[4].y > lm[9].y)
      return { letter: 'S', conf: 0.81 };

    // T: Thumb inserted between index and middle curled fingers
    if (!f.idx && !f.mid && !f.ring && !f.pin &&
        thumbAboveIdxMcp && lm[4].y < lm[8].y && lm[4].y > lm[5].y)
      return { letter: 'T', conf: 0.75 };

    // FIX: U vs V disambiguation
    // U: Index + middle together (tips close)
    // V: Index + middle spread apart (tips far)
    if (f.idx && f.mid && !f.ring && !f.pin) {
      if (d812 < 0.14)
        return { letter: 'U', conf: 0.83 };
      if (d812 > 0.17)
        return { letter: 'V', conf: 0.85 };
    }

    // W: Index + middle + ring spread wide, pinky folded
    if (f.idx && f.mid && f.ring && !f.pin && d816 > 0.28)
      return { letter: 'W', conf: 0.82 };

    // X: Index hooked (bent at DIP, not fully extended or curled)
    if (!f.idx && !f.mid && !f.ring && !f.pin &&
        lm[8].y < lm[5].y && lm[8].y > lm[7].y - 0.01)
      return { letter: 'X', conf: 0.73 };

    // Y: Thumb + pinky extended, others curled
    if (!f.idx && !f.mid && !f.ring && f.pin && f.thumb && td420 > 0.55)
      return { letter: 'Y', conf: 0.86 };

    return { letter: '?', conf: 0.0 };
  }

  // Reset smoothing buffer (call when camera restarts)
  function reset() { smoothBuf.length = 0; }

  return { recognize, reset };
})();
</script>
