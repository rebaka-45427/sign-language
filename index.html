/* ── App Component ───────────────────────────────────────────────── */
function App() {
  const [page, setPage]           = useState('detect');
  const [hc, setHc]               = useState(false);
  const [cameraOn, setCameraOn]   = useState(false);
  const [mpReady, setMpReady]     = useState(false);
  const [mpLoading, setMpLoading] = useState(false);
  const [detecting, setDetecting] = useState(false);

  // Gesture state — using refs for hot path, state only for UI
  const [stableResult, setStable] = useState({ letter: '', conf: 0, hand: '' });
  const [noHandSince, setNoHand]  = useState(0);   // ms timestamp
  const [handVisible, setHandVis] = useState(false);
  const [fps, setFps]             = useState(0);
  const [debugMode, setDebugMode] = useState(false);
  const [debugLog, setDebugLog]   = useState([]);

  const [wordBuffer, setWordBuf]  = useState([]);
  const [history, setHistory]     = useState([]);
  const [suggestions, setSugg]    = useState([]);
  const [alert, setAlert]         = useState(null);

  const [messages, setMessages]   = useState([
    { id: 1, from: 'them', text: "Hi! I'm using SignSense.", time: '12:01' },
    { id: 2, from: 'me',   text: 'Hello! Great to connect 👋', time: '12:02' },
  ]);
  const [chatIn, setChatIn]       = useState('');
  const [capText, setCapText]     = useState('');
  const [listening, setListening] = useState(false);
  const [transcript, setTr]       = useState([]);

  const [learnTarget, setTarget]  = useState('A');
  const [score, setScore]         = useState(0);
  const [streak, setStreak]       = useState(0);
  const [doneLetters, setDone]    = useState([]);
  const [feedback, setFB]         = useState('wait');

  const [trainStep, setTStep]     = useState(0);
  const [trainName, setTName]     = useState('');
  const [trainSamples, setTSamp]  = useState(0);
  const [savedGestures, setSaved] = useState(
    () => JSON.parse(localStorage.getItem('ss_gestures') || '[]')
  );

  const [ttsOn, setTts]           = useState(true);
  const [sens, setSens]           = useState(65);
  const [overlay, setOverlay]     = useState(true);
  const [showFps, setShowFps]     = useState(true);

  // Refs (heavy objects — never trigger re-renders)
  const videoRef   = useRef(null);
  const canvasRef  = useRef(null);
  const streamRef  = useRef(null);
  const handsRef   = useRef(null);
  const camApiRef  = useRef(null);
  const speechRef  = useRef(null);
  const chatBotRef = useRef(null);

  // Stability + timing refs
  const resultBuf  = useRef([]);  // last 7 raw predictions
  const lastAdded  = useRef(0);   // timestamp of last word-add
  const stableRef  = useRef({ letter: '', conf: 0 }); // hot-path stable result

  // FPS measurement refs
  const fpsFrames  = useRef(0);
  const fpsTimer   = useRef(0);

  // ── FPS Counter ─────────────────────────────────────────────────
  // Update FPS display every second via frame counting in onResults
  const tickFps = useCallback(() => {
    fpsFrames.current++;
    const now = Date.now();
    if (now - fpsTimer.current >= 1000) {
      setFps(fpsFrames.current);
      fpsFrames.current = 0;
      fpsTimer.current = now;
    }
  }, []);

  // ── Camera Start ─────────────────────────────────────────────────
  /*  FIX: Proper async flow:
      1. getUserMedia → set srcObject
      2. Wait for 'loadedmetadata' event before calling play()
      3. Wait for video.readyState >= 2 before starting MediaPipe
      4. Show loading overlay during MediaPipe model download
  */
  const startCamera = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
        audio: false,
      });

      streamRef.current = stream;
      const video = videoRef.current;
      if (!video) { stream.getTracks().forEach(t => t.stop()); return; }

      video.srcObject = stream;
      setCameraOn(true);
      setMpLoading(true);

      // FIX: Wait for metadata before playing
      await new Promise((resolve, reject) => {
        video.onloadedmetadata = resolve;
        video.onerror = reject;
        setTimeout(reject, 8000); // timeout fallback
      });

      await video.play();
      window.SignEngine.reset();
      initMediaPipe(video);
    } catch (err) {
      console.error('[SignSense] Camera error:', err);
      const msg = err.name === 'NotAllowedError'
        ? '🔒 Camera permission denied — please allow access in browser settings'
        : err.name === 'NotFoundError'
          ? '📷 No camera found — please connect a webcam'
          : `Camera failed: ${err.message}`;
      showAlert(msg, 'danger');
      setCameraOn(false);
      setMpLoading(false);
    }
  }, []);

  // ── MediaPipe Initialisation ─────────────────────────────────────
  /*  FIX: Only create one Hands instance per camera session.
      Uses the Camera utility for frame-by-frame loop with proper
      readyState check to avoid sending blank frames.
  */
  const initMediaPipe = useCallback((video) => {
    if (!window.Hands) {
      showAlert('MediaPipe Hands not loaded — check CDN connection', 'danger');
      setMpLoading(false);
      return;
    }

    // Clean up any prior instance
    handsRef.current?.close?.();
    camApiRef.current?.stop?.();

    const hands = new window.Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.45,  // FIX: lowered for better sensitivity
      minTrackingConfidence: 0.40,   // FIX: lowered for smoother tracking
    });

    hands.onResults(onResults);
    handsRef.current = hands;

    const cam = new window.Camera(video, {
      onFrame: async () => {
        // FIX: Only send frame when video has actual data (readyState 4)
        if (video.readyState === 4 && !video.paused) {
          try {
            await hands.send({ image: video });
          } catch (e) {
            console.warn('[SignSense] Frame send error:', e.message);
          }
        }
      },
      width: 640,
      height: 480,
    });

    cam.start();
    camApiRef.current = cam;
    fpsTimer.current = Date.now();
    setMpReady(true);
    setMpLoading(false);
    setDetecting(true);
  }, []);

  // ── onResults: hot path ──────────────────────────────────────────
  /*  This runs ~30x per second. Key optimisations:
      - Use refs for stability buffer and timing (no state calls)
      - Batch React state updates
      - Canvas draw only when overlay is on
      - Confidence threshold gating
  */
  const overlayRef  = useRef(overlay);
  const sensRef     = useRef(sens);
  const ttsRef      = useRef(ttsOn);
  const debugRef    = useRef(debugMode);
  useEffect(() => { overlayRef.current = overlay; }, [overlay]);
  useEffect(() => { sensRef.current = sens; }, [sens]);
  useEffect(() => { ttsRef.current = ttsOn; }, [ttsOn]);
  useEffect(() => { debugRef.current = debugMode; }, [debugMode]);

  const onResults = useCallback((results) => {
    tickFps();

    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width  = results.image?.width  || 640;
    canvas.height = results.image?.height || 480;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!results.multiHandLandmarks?.length) {
      // No hand detected
      setHandVis(false);
      return;
    }

    setHandVis(true);
    const lm         = results.multiHandLandmarks[0];
    const handLabel  = results.multiHandedness?.[0]?.label || 'Right';

    // ── Draw skeleton overlay ──────────────────────────────────
    if (overlayRef.current) {
      if (window.drawConnectors && window.HAND_CONNECTIONS) {
        window.drawConnectors(ctx, lm, window.HAND_CONNECTIONS, {
          color: 'rgba(79,142,247,0.65)',
          lineWidth: 2,
        });
      }
      if (window.drawLandmarks) {
        window.drawLandmarks(ctx, lm, {
          color: '#a78bfa',
          fillColor: 'rgba(79,142,247,0.3)',
          lineWidth: 1,
          radius: 4,
        });
      }
    }

    // ── Recognise gesture ──────────────────────────────────────
    const raw = window.SignEngine.recognize(lm, handLabel);

    // Debug logging (sampled to avoid flooding)
    if (debugRef.current && fpsFrames.current % 5 === 0) {
      setDebugLog(d => [`${raw.letter} (${Math.round(raw.conf * 100)}%) ${handLabel}`, ...d.slice(0, 9)]);
    }

    // ── Stability buffer ───────────────────────────────────────
    /*  FIX: Improved stability logic
        - Buffer last 7 predictions
        - Require ≥3 occurrences of same letter (not 2)
        - Weight by confidence: only count frames above min threshold
        - Minimum raw confidence gate before adding to buffer
    */
    const minConfGate = (sensRef.current / 100) * 0.55; // e.g. 65% sens → ~0.36 gate
    if (raw.conf >= minConfGate && raw.letter !== '?') {
      resultBuf.current.push(raw.letter);
    } else {
      resultBuf.current.push(null); // padding keeps timing consistent
    }
    if (resultBuf.current.length > 7) resultBuf.current.shift();

    const counts = {};
    resultBuf.current.forEach(l => { if (l) counts[l] = (counts[l] || 0) + 1; });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];

    if (top && top[1] >= 3 && top[0] !== '?') {
      const sLetter = top[0];
      const sConf   = raw.conf;

      // Update stable display result
      stableRef.current = { letter: sLetter, conf: sConf };
      setStable({ letter: sLetter, conf: sConf, hand: handLabel });

      // ── Add to word buffer (throttled) ─────────────────────
      const now = Date.now();
      if (now - lastAdded.current > 1150) {
        lastAdded.current = now;

        setWordBuf(b => {
          const nb = [...b, sLetter];
          // Update suggestions based on first letter
          setSugg(WORD_DB[nb[0]] || []);
          return nb.slice(-24);
        });

        setHistory(h => [{
          letter: sLetter, conf: sConf,
          hand: handLabel, time: new Date().toLocaleTimeString(),
        }, ...h.slice(0, 99)]);

        // Emergency gesture detection
        if (sLetter === 'S' && /* STOP shape */ true) {
          // Already handled via letter; can be extended
        }

        // TTS readout
        if (ttsRef.current && window.speechSynthesis) {
          const u = new SpeechSynthesisUtterance(sLetter);
          u.rate = 1.15;
          u.volume = 0.9;
          window.speechSynthesis.speak(u);
        }
      }
    }
  }, [tickFps]);

  // ── Stop Camera ───────────────────────────────────────────────────
  const stopCamera = useCallback(() => {
    camApiRef.current?.stop?.();
    handsRef.current?.close?.();
    streamRef.current?.getTracks().forEach(t => t.stop());
    window.SignEngine.reset();
    setCameraOn(false);
    setDetecting(false);
    setMpReady(false);
    setHandVis(false);
    setStable({ letter: '', conf: 0, hand: '' });
    resultBuf.current = [];
    stableRef.current = { letter: '', conf: 0 };
  }, []);

  // ── Alert ─────────────────────────────────────────────────────────
  const showAlert = useCallback((msg, type = 'warn') => {
    setAlert({ msg, type });
    setTimeout(() => setAlert(null), 4500);
  }, []);

  // ── Speech ────────────────────────────────────────────────────────
  const speak = useCallback((txt) => {
    if (!txt || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.rate = 0.95;
    window.speechSynthesis.speak(u);
  }, []);

  // ── Caption / Speech Recognition ─────────────────────────────────
  const startListen = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showAlert('Speech recognition not supported in this browser', 'danger'); return; }
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'en-US';
    r.onresult = e => {
      let fin = '', int = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) fin += e.results[i][0].transcript + ' ';
        else int += e.results[i][0].transcript;
      }
      setCapText(fin + int);
      if (fin) setTr(t => [...t, { text: fin.trim(), time: new Date().toLocaleTimeString() }]);
    };
    r.onend = () => setListening(false);
    r.onerror = () => setListening(false);
    r.start();
    speechRef.current = r;
    setListening(true);
  }, [showAlert]);

  const stopListen = useCallback(() => {
    speechRef.current?.stop();
    setListening(false);
  }, []);

  const saveTr = useCallback(() => {
    const t = transcript.map(x => `[${x.time}] ${x.text}`).join('\n');
    const b = new Blob([t], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'signsense_transcript.txt';
    a.click();
  }, [transcript]);

  // ── Chat ──────────────────────────────────────────────────────────
  const sendChat = useCallback(() => {
    if (!chatIn.trim()) return;
    const msg = { id: Date.now(), from: 'me', text: chatIn, time: new Date().toLocaleTimeString() };
    setMessages(m => [...m, msg]);
    setChatIn('');
    clearTimeout(chatBotRef.current);
    chatBotRef.current = setTimeout(() => {
      setMessages(m => [...m, { id: Date.now() + 1, from: 'them', text: 'Got it! 👍', time: new Date().toLocaleTimeString() }]);
    }, 900);
  }, [chatIn]);

  // ── Learning ──────────────────────────────────────────────────────
  const checkLearn = useCallback(() => {
    if (!detecting) { showAlert('Start camera first', 'warn'); return; }
    const cur = stableRef.current;
    if (cur.letter === learnTarget && cur.conf > 0.68) {
      setFB('ok');
      setScore(s => s + 10);
      setStreak(s => s + 1);
      setDone(d => [...new Set([...d, learnTarget])]);
      speak('Correct!');
      setTimeout(() => {
        const i = ALPHABET.indexOf(learnTarget);
        if (i < ALPHABET.length - 1) setTarget(ALPHABET[i + 1]);
        setFB('wait');
      }, 1400);
    } else {
      setFB('no');
      setStreak(0);
      speak('Try again');
      setTimeout(() => setFB('wait'), 1400);
    }
  }, [detecting, learnTarget, speak, showAlert]);

  // ── Training ──────────────────────────────────────────────────────
  const captureSample = useCallback(() => {
    setTSamp(n => {
      const ns = n + 1;
      if (ns >= 8) {
        setTStep(2);
        const newGestures = [...savedGestures, { name: trainName, samples: 8, date: new Date().toLocaleDateString() }];
        setSaved(newGestures);
        localStorage.setItem('ss_gestures', JSON.stringify(newGestures));
        showAlert('✅ Training complete!', 'ok');
      }
      return ns;
    });
  }, [trainName, savedGestures, showAlert]);

  // ── Cleanup ───────────────────────────────────────────────────────
  useEffect(() => () => {
    stopCamera();
    stopListen();
    clearTimeout(chatBotRef.current);
  }, []);

  // ── Derived UI values ──────────────────────────────────────────── */
  const confPct  = Math.round((stableResult.conf || 0) * 100);
  const cCls     = confClass(confPct);

  // Confidence bar gradient color
  const barColor = confBarColor(confPct);

  // Warning: no hand for >2 seconds
  const showNoHand = cameraOn && !handVisible && detecting;

  // Nav items
  const navItems = [
    { id: 'detect',       icon: '👁️',  label: 'Detect',      badge: detecting ? 'LIVE' : null, bc: 'g' },
    { id: 'reference',    icon: '📖',  label: 'Sign Guide' },
    { id: 'conversation', icon: '💬',  label: 'Chat',        badge: messages.length, bc: 'b' },
    { id: 'captions',     icon: '🧾',  label: 'Captions' },
    { id: 'learn',        icon: '🎓',  label: 'Learning' },
    { id: 'train',        icon: '🎯',  label: 'Training' },
    { id: 'history',      icon: '🕐',  label: 'History',     badge: history.length || null },
    { id: 'settings',     icon: '⚙️',  label: 'Settings' },
  ];

  // ── Camera Pane (shared between Detect + Conversation pages) ─────
  const CamPane = ({ mini }) => (
    <div className="cam-wrap" style={{ aspectRatio: mini ? '4/3' : '4/3', minHeight: mini ? 200 : 260 }}>
      <video ref={videoRef} autoPlay playsInline muted
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
          objectFit: 'cover', display: cameraOn ? 'block' : 'none', transform: 'scaleX(-1)' }} />
      <canvas ref={canvasRef}
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
          display: cameraOn ? 'block' : 'none', transform: 'scaleX(-1)', pointerEvents: 'none' }} />

      {!cameraOn && (
        <div className="cam-off">
          <div className="oi">📷</div>
          <div style={{ fontWeight: 600, color: 'var(--text2)' }}>Camera off</div>
          <div style={{ fontSize: 11, color: 'var(--text3)' }}>Click to start</div>
          <button className="btn btn-p btn-sm" onClick={startCamera}>📷 Start Camera</button>
        </div>
      )}

      {mpLoading && (
        <div className="mp-loading">
          <div className="mp-spinner" />
          <div className="mp-loading-text">Loading MediaPipe Hands…</div>
          <div style={{ fontSize: 10, color: 'var(--text3)' }}>First load may take 5–10s</div>
        </div>
      )}

      {cameraOn && (
        <div className="cam-hud">
          <div className="hud-badge"><div className="rec-dot" />LIVE</div>
          <div className="hud-right">
            {stableResult.hand && (
              <div className="hud-badge" style={{ background: 'rgba(79,142,247,.25)' }}>
                {stableResult.hand} Hand · {confPct}%
              </div>
            )}
            {showFps && (
              <div className="hud-badge">
                <span className="fps-counter" style={{ color: fps >= 24 ? 'var(--accent3)' : 'var(--warn)' }}>
                  {fps} FPS
                </span>
              </div>
            )}
          </div>
        </div>
      )}

      {/* No hand detected warning */}
      {showNoHand && (
        <div className="no-hand-msg">👋 No hand detected — show your hand to the camera</div>
      )}

      <div className="cam-ctrls">
        <button className="cc-btn cc-secondary" onClick={cameraOn ? stopCamera : startCamera}>
          {cameraOn ? '🚫' : '📷'}
        </button>
        {cameraOn && (
          <button className={`cc-btn ${mpReady ? 'cc-danger' : 'cc-primary'}`} title="MediaPipe status" disabled>
            {mpReady ? '🧠' : '⏳'}
          </button>
        )}
        <button className="cc-btn cc-secondary" onClick={() => speak(wordBuffer.join('') || stableResult.letter)}>🔊</button>
        <button className="cc-btn cc-secondary" onClick={() => setWordBuf([])}>🗑️</button>
      </div>
    </div>
  );

  // ── Render ────────────────────────────────────────────────────────
  return (
    <div className={`app${hc ? ' hc' : ''}`}>

      {/* ── SIDEBAR ─────────────────────────────────────────────── */}
      <nav className="sidebar">
        <div className="logo">
          <div className="logo-icon">🤟</div>
          <div className="logo-text">Sign<span>Sense</span></div>
        </div>

        <div className="nav-sec">Navigation</div>
        {navItems.map(n => (
          <button key={n.id} className={`nav-btn${page === n.id ? ' active' : ''}`} onClick={() => setPage(n.id)}>
            <span className="ni">{n.icon}</span>
            <span>{n.label}</span>
            {n.badge != null && <span className={`nbadge ${n.bc || ''}`}>{n.badge}</span>}
          </button>
        ))}

        <div style={{ marginTop: 'auto' }}>
          <div className="hr" />
          <div className="nav-sec">Accessibility</div>
          <button className="nav-btn" onClick={() => setHc(h => !h)}>
            <span className="ni">🔆</span><span>High Contrast</span>
            {hc && <span className="nbadge g">ON</span>}
          </button>
          <button className="nav-btn" onClick={() => setTts(t => !t)}>
            <span className="ni">🔊</span><span>Voice Output</span>
            {ttsOn && <span className="nbadge b">ON</span>}
          </button>
        </div>
      </nav>

      {/* ── MAIN ─────────────────────────────────────────────────── */}
      <div className="main">

        {/* Topbar */}
        <div className="topbar">
          <div>
            <div className="tb-title">
              {navItems.find(n => n.id === page)?.icon}{' '}
              {navItems.find(n => n.id === page)?.label}
            </div>
            <div className="tb-sub">SignSense · MediaPipe Hands · ASL Recognition · Offline</div>
          </div>
          <div className="tb-right">
            {cameraOn   && <div className="pill live"><span className="pulse" />Camera On</div>}
            {detecting  && <div className="pill detect">⚡ Detecting</div>}
            {mpReady    && <div className="pill" style={{ borderColor: 'var(--accent2)', color: 'var(--accent2)' }}>🧠 MediaPipe</div>}
            {showFps    && detecting && <div className="pill fps">
              <span style={{ color: fps >= 24 ? 'var(--accent3)' : 'var(--warn)' }}>{fps} fps</span>
            </div>}
            <div className="pill">📶 Offline</div>
          </div>
        </div>

        {/* ── CONTENT AREA ─────────────────────────────────────── */}
        <div className="content">

          {/* ═══ DETECT PAGE ═══ */}
          {page === 'detect' && (
            <div className="detect-grid">

              {/* LEFT: Camera + Word Builder */}
              <div className="col">
                <CamPane />

                {/* Word Builder */}
                <div className="card">
                  <div className="ctitle">
                    ✍️ Word Builder
                    <span style={{ marginLeft: 'auto', fontSize: 10, color: 'var(--text3)', fontWeight: 400 }}>
                      Letters add after 1.2s hold
                    </span>
                    {wordBuffer.length > 0 && (
                      <>
                        <button className="space-btn" onClick={() => setWordBuf(b => [...b, ' '])}>⎵ Space</button>
                        <button className="backspace-btn" onClick={() => setWordBuf(b => b.slice(0, -1))}>⌫</button>
                      </>
                    )}
                  </div>

                  <div className="word-chips">
                    {wordBuffer.length === 0
                      ? <span style={{ color: 'var(--text3)', fontSize: 12 }}>Hold a sign steady — letters appear here…</span>
                      : wordBuffer.map((l, i) => (
                          <div key={i}
                            className={`wchip${i === wordBuffer.length - 1 ? ' cur' : ''}${l === ' ' ? ' space-chip' : ''}`}
                            onClick={() => setWordBuf(b => b.filter((_, j) => j !== i))}
                            title="Click to remove">
                            {l === ' ' ? '·' : l}
                          </div>
                        ))
                    }
                  </div>

                  {wordBuffer.length > 0 && (
                    <>
                      <div style={{ fontFamily: 'var(--font-head)', fontSize: 20, fontWeight: 700, margin: '8px 0', color: 'var(--text)' }}>
                        {wordBuffer.join('').trim()}
                      </div>
                      {suggestions.length > 0 && (
                        <div className="sugg-row">
                          {suggestions.map(s => (
                            <button key={s} className="sugg-btn"
                              onClick={() => { setWordBuf(s.split('')); speak(s); }}>
                              {SIGN_EMOJI[s] || ''} {s}
                            </button>
                          ))}
                        </div>
                      )}
                      <div className="row" style={{ marginTop: 8 }}>
                        <button className="btn btn-p btn-sm" onClick={() => speak(wordBuffer.join('').trim())}>🔊 Speak</button>
                        <button className="btn btn-s btn-sm" onClick={() => {
                          setMessages(m => [...m, { id: Date.now(), from: 'me', text: wordBuffer.join('').trim(), time: new Date().toLocaleTimeString() }]);
                          setWordBuf([]);
                        }}>📤 Chat</button>
                        <button className="btn btn-s btn-sm" onClick={() => setWordBuf([])}>🗑 Clear</button>
                      </div>
                    </>
                  )}
                </div>

                {/* Debug panel */}
                {debugMode && (
                  <div className="card">
                    <div className="ctitle">🐛 Debug Log
                      <button className="btn btn-s btn-sm" style={{ marginLeft: 'auto' }} onClick={() => setDebugLog([])}>Clear</button>
                    </div>
                    <div className="debug-panel">
                      {debugLog.map((l, i) => <div key={i}>{l}</div>)}
                      {debugLog.length === 0 && <div style={{ color: 'var(--text3)' }}>Waiting for frames…</div>}
                    </div>
                  </div>
                )}
              </div>

              {/* RIGHT: Output + Status */}
              <div className="out-panel">

                {/* Big letter display */}
                <div className="big-out">
                  <div className={`big-letter ${cCls}`}>
                    {stableResult.letter || '—'}
                  </div>
                  <div style={{ fontSize: 32, marginTop: 4 }}>{SIGN_EMOJI[stableResult.letter] || ''}</div>
                  <div style={{ fontSize: 10, color: 'var(--text3)', marginTop: 4 }}>
                    {stableResult.letter ? SIGN_DESCRIPTIONS[stableResult.letter] || '' : 'Show a sign to the camera'}
                  </div>

                  <div className="conf-wrap">
                    <div className="conf-row">
                      <span>Confidence</span>
                      <span style={{ color: barColor, fontWeight: 700 }}>{confPct}%</span>
                    </div>
                    <div className="conf-bar">
                      <div className="conf-fill" style={{ width: `${confPct}%`, background: barColor }} />
                    </div>
                    {confPct > 0 && confPct < 45 && (
                      <div style={{ color: 'var(--conf-vlo)', fontSize: 10, marginTop: 4 }}>
                        ⚠ Very low — reposition hand or improve lighting
                      </div>
                    )}
                    {confPct >= 45 && confPct < 65 && (
                      <div style={{ color: 'var(--conf-lo)', fontSize: 10, marginTop: 4 }}>
                        ⚠ Medium — move closer to camera
                      </div>
                    )}
                    {!cameraOn && (
                      <div style={{ color: 'var(--text3)', fontSize: 10, marginTop: 4 }}>Start camera to begin</div>
                    )}
                  </div>
                </div>

                {/* Detection info */}
                <div className="card">
                  <div className="ctitle">🤝 Detection Status</div>
                  <div className="row" style={{ flexWrap: 'wrap', gap: 5 }}>
                    <div className="pill">Hand: {stableResult.hand || '—'}</div>
                    <div className="pill" style={{ borderColor: mpReady ? 'var(--accent3)' : 'var(--border)', color: mpReady ? 'var(--accent3)' : 'var(--text3)' }}>
                      {mpReady ? '✓ Active' : 'Off'}
                    </div>
                    <div className="pill">Sens: {sens}%</div>
                  </div>
                  {!cameraOn && (
                    <button className="btn btn-p btn-sm" style={{ marginTop: 8 }} onClick={startCamera}>📷 Start Camera</button>
                  )}
                  {showNoHand && (
                    <div style={{ marginTop: 7, fontSize: 11, color: 'var(--warn)' }}>
                      👋 No hand visible — position your hand in frame
                    </div>
                  )}
                </div>

                {/* Recent signs */}
                <div className="card">
                  <div className="ctitle">⏱ Recent Signs
                    <span style={{ marginLeft: 'auto', fontSize: 10, color: 'var(--text3)', fontWeight: 400 }}>last {Math.min(history.length, 7)}</span>
                  </div>
                  <div className="hist-list">
                    {history.slice(0, 7).map((h, i) => (
                      <div key={i} className="hist-item">
                        <div className="hl">{h.letter}</div>
                        <div style={{ fontSize: 16 }}>{SIGN_EMOJI[h.letter] || ''}</div>
                        <div className="conf-bar" style={{ flex: 1, height: 4 }}>
                          <div className="conf-fill" style={{ width: `${Math.round(h.conf * 100)}%`, background: confBarColor(Math.round(h.conf * 100)) }} />
                        </div>
                        <div style={{ fontSize: 10, color: 'var(--text3)' }}>{Math.round(h.conf * 100)}%</div>
                        <div className="hist-t">{h.time}</div>
                      </div>
                    ))}
                    {history.length === 0 && <div style={{ color: 'var(--text3)', fontSize: 12 }}>No detections yet</div>}
                  </div>
                </div>

                {/* Common signs quick-speak */}
                <div className="card">
                  <div className="ctitle">💬 Quick Phrases</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                    {COMMON.map(w => (
                      <button key={w} className="btn btn-s btn-sm" onClick={() => speak(w)} style={{ fontSize: 10 }}>
                        {SIGN_EMOJI[w]} {w}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ═══ SIGN REFERENCE ═══ */}
          {page === 'reference' && (
            <div className="col">
              <div className="card">
                <div className="ctitle">📖 ASL Alphabet (A–Z)</div>
                <div className="sign-ref-grid">
                  {ALPHABET.map(l => (
                    <div key={l} className="sign-ref-item" onClick={() => speak(l)}>
                      <div className="sl">{l}</div>
                      <div className="sd">{SIGN_EMOJI[l] || '🤚'}</div>
                      <div style={{ fontSize: 8, color: 'var(--text3)', marginTop: 2, lineHeight: 1.3 }}>
                        {SIGN_DESCRIPTIONS[l]?.split(',')[0]}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="card">
                <div className="ctitle">🔢 Numbers (0–9)</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 5 }}>
                  {DIGITS.map(d => (
                    <div key={d} className="sign-ref-item" onClick={() => speak(d)}>
                      <div className="sl">{d}</div>
                      <div className="sd">{SIGN_EMOJI[d] || '🤚'}</div>
                      <div style={{ fontSize: 8, color: 'var(--text3)', marginTop: 2, lineHeight: 1.3 }}>
                        {SIGN_DESCRIPTIONS[d]?.split(',')[0]}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="card">
                <div className="ctitle">💡 Tips for Accurate Detection</div>
                <ul style={{ color: 'var(--text2)', fontSize: 12, lineHeight: 2.1, paddingLeft: 16 }}>
                  <li>Use front lighting — avoid sitting with a bright window behind you</li>
                  <li>Keep hand 30–60 cm from camera, fully visible in frame</li>
                  <li>Hold each sign still for ~1 second to register it</li>
                  <li>Plain background (desk, wall) improves accuracy</li>
                  <li>Adjust <strong>Sensitivity</strong> in Settings if too many false detections</li>
                  <li>Letters J and Z require movement — static frame shows I/Z approximation</li>
                  <li>Good rule: if the FPS drops below 20, reduce other browser tabs</li>
                </ul>
              </div>
            </div>
          )}

          {/* ═══ CONVERSATION ═══ */}
          {page === 'conversation' && (
            <div className="conv-grid">
              <div className="col">
                <CamPane mini />
                <div className="big-out" style={{ padding: '12px 14px' }}>
                  <div className={`big-letter ${cCls}`} style={{ fontSize: 58 }}>
                    {stableResult.letter || '—'}
                  </div>
                  <div style={{ fontSize: 22 }}>{SIGN_EMOJI[stableResult.letter] || ''}</div>
                  <div style={{ fontSize: 10, color: 'var(--text3)', marginTop: 3 }}>
                    {confPct}% · {stableResult.hand || 'No hand'}
                  </div>
                </div>
                <div className="row" style={{ gap: 5, flexWrap: 'wrap' }}>
                  <button className="btn btn-p btn-sm" onClick={() => {
                    if (wordBuffer.length) {
                      setMessages(m => [...m, { id: Date.now(), from: 'me', text: `[SIGN] ${wordBuffer.join('').trim()}`, time: new Date().toLocaleTimeString() }]);
                      setWordBuf([]);
                    }
                  }}>📤 Send Sign</button>
                  <button className="btn btn-s btn-sm" onClick={() => speak(wordBuffer.join('') || stableResult.letter)}>🔊</button>
                  <button className="btn btn-s btn-sm" onClick={() => setWordBuf([])}>🗑</button>
                </div>
              </div>

              <div className="card" style={{ display: 'flex', flexDirection: 'column', padding: 0, overflow: 'hidden' }}>
                <div style={{ padding: '10px 13px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 7 }}>
                  <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700 }}>💬 Conversation</div>
                  <div className="sp" />
                  <div className="pill">{messages.length} msgs</div>
                </div>
                <div className="chat-msgs">
                  {messages.map(m => (
                    <div key={m.id} className={`msg ${m.from === 'me' ? 'me' : 'them'}`}>
                      <div className="msg-bub">{m.text}</div>
                      <div className="msg-meta">{m.time}</div>
                    </div>
                  ))}
                </div>
                <div className="chat-in-row">
                  <input className="chat-in" placeholder="Type or let signs fill in…" value={chatIn}
                    onChange={e => setChatIn(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && sendChat()} />
                  <button className="btn btn-p btn-sm" onClick={sendChat}>Send</button>
                  <button className="btn btn-s btn-sm" onClick={listening ? stopListen : startListen}>🎤</button>
                </div>
              </div>
            </div>
          )}

          {/* ═══ CAPTIONS ═══ */}
          {page === 'captions' && (
            <div className="col">
              <div className="row" style={{ flexWrap: 'wrap', gap: 7 }}>
                <button className={`btn ${listening ? 'btn-d' : 'btn-p'}`} onClick={listening ? stopListen : startListen}>
                  {listening ? '⏹ Stop' : '🎤 Start Live Captions'}
                </button>
                <button className="btn btn-s" onClick={saveTr} disabled={!transcript.length}>💾 Save</button>
                <button className="btn btn-s" onClick={() => { setCapText(''); setTr([]); }}>🗑 Clear</button>
                {listening && <div className="pill live">🔴 Listening…</div>}
              </div>
              <div className="cap-area">
                {capText || <div className="cap-ph">Captions appear here when you speak…<br />Click "Start Live Captions" then begin speaking.</div>}
              </div>
              <div className="card">
                <div className="ctitle" style={{ justifyContent: 'space-between' }}>
                  📜 Transcript ({transcript.length})
                  <button className="btn btn-s btn-sm" onClick={saveTr} disabled={!transcript.length}>⬇ Download</button>
                </div>
                <div className="tr-box">
                  {transcript.length === 0
                    ? <div style={{ color: 'var(--text3)', fontSize: 12 }}>Transcript builds as you speak…</div>
                    : transcript.map((t, i) => (
                        <div key={i} className="tr-line"><span>[{t.time}]</span>{t.text}</div>
                      ))
                  }
                </div>
              </div>
            </div>
          )}

          {/* ═══ LEARNING ═══ */}
          {page === 'learn' && (
            <div className="learn-grid">
              <div className="col">
                <div className="score-row">
                  <div className="score-box"><div className="score-n">{score}</div><div className="score-l">📊 Score</div></div>
                  <div className="score-box"><div className="score-n" style={{ color: 'var(--warn)' }}>🔥{streak}</div><div className="score-l">Streak</div></div>
                  <div className="score-box"><div className="score-n" style={{ color: 'var(--accent3)' }}>{doneLetters.length}</div><div className="score-l">Done</div></div>
                </div>
                <div className="card">
                  <div className="ctitle">🎯 Practice Target</div>
                  <div className="row" style={{ flexWrap: 'wrap', gap: 14 }}>
                    <div style={{ fontFamily: 'var(--font-head)', fontSize: 72, fontWeight: 800, color: 'var(--accent)', textShadow: '0 0 26px var(--accent)' }}>
                      {learnTarget}
                    </div>
                    <div style={{ fontSize: 48 }}>{SIGN_EMOJI[learnTarget] || '🤚'}</div>
                    <div className="col" style={{ gap: 5 }}>
                      <div style={{ fontSize: 11, color: 'var(--text2)' }}>Sign: <strong style={{ color: 'var(--accent)' }}>{learnTarget}</strong></div>
                      <div style={{ fontSize: 10, color: 'var(--text3)' }}>{SIGN_DESCRIPTIONS[learnTarget]}</div>
                      <button className="btn btn-p btn-sm" onClick={checkLearn}>✅ Check My Sign</button>
                    </div>
                  </div>
                </div>
                <div className={`fb-box ${feedback === 'ok' ? 'fb-ok' : feedback === 'no' ? 'fb-no' : 'fb-wait'}`}>
                  {feedback === 'ok' && '🎉 Correct! Excellent!'}
                  {feedback === 'no' && '❌ Not quite — check finger positions'}
                  {feedback === 'wait' && '👋 Show the sign then press Check'}
                </div>
                <div className="card">
                  <div className="ctitle">📡 Live Camera</div>
                  {!cameraOn
                    ? <button className="btn btn-p btn-sm" onClick={startCamera}>📷 Start Camera</button>
                    : <div className="row">
                        <span className="pulse" />
                        <span style={{ fontSize: 12 }}>
                          Detected: <strong style={{ color: confBarColor(confPct), fontFamily: 'var(--font-head)', fontSize: 20 }}>
                            {stableResult.letter || '—'}
                          </strong> · {confPct}%
                        </span>
                      </div>
                  }
                </div>
              </div>

              <div className="col">
                <div className="card">
                  <div className="ctitle">🔡 A–Z Progress</div>
                  <div className="ab-grid">
                    {ALPHABET.map(l => (
                      <button key={l} className={`ab-btn${doneLetters.includes(l) ? ' done' : ''}${l === learnTarget ? ' cur' : ''}`}
                        onClick={() => setTarget(l)}>
                        {l}
                        {doneLetters.includes(l) && <span className="star">⭐</span>}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="card">
                  <div className="ctitle">🔢 0–9</div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 4 }}>
                    {DIGITS.map(d => (
                      <button key={d} className={`ab-btn${d === learnTarget ? ' cur' : ''}`} onClick={() => setTarget(d)}>
                        {d}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ═══ TRAINING ═══ */}
          {page === 'train' && (
            <div className="col" style={{ maxWidth: 680 }}>
              <div className="card">
                <div className="ctitle">🎯 Custom Gesture Training</div>
                <div style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 13, lineHeight: 1.7 }}>
                  Train SignSense on your own gestures. All data stays on your device (localStorage).
                </div>
                {trainStep === 0 && (
                  <div className="col">
                    <label style={{ fontSize: 12, color: 'var(--text2)' }}>Gesture name:</label>
                    <input className="chat-in" placeholder="e.g. Wave Hello, Thumbs Up…" value={trainName}
                      onChange={e => setTName(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && trainName && setTStep(1)} />
                    <button className="btn btn-p" onClick={() => trainName && setTStep(1)}>Next →</button>
                  </div>
                )}
                {trainStep === 1 && (
                  <div className="col">
                    <div style={{ color: 'var(--text2)', fontSize: 13 }}>
                      Capturing: <strong style={{ color: 'var(--accent)' }}>{trainName}</strong> · {trainSamples}/8 samples
                    </div>
                    <div className="sample-grid">
                      {[...Array(8)].map((_, i) => (
                        <div key={i} className={`sth${i < trainSamples ? ' cap' : ''}`} onClick={captureSample}>
                          {i < trainSamples ? '✅' : '📸'}
                        </div>
                      ))}
                    </div>
                    <div style={{ height: 5, background: 'var(--border)', borderRadius: 4, overflow: 'hidden' }}>
                      <div style={{ height: '100%', background: 'var(--accent)', width: `${trainSamples / 8 * 100}%`, transition: 'width .28s' }} />
                    </div>
                    <button className="btn btn-s btn-sm" onClick={() => { setTStep(0); setTName(''); setTSamp(0); }}>↩ Restart</button>
                  </div>
                )}
                {trainStep === 2 && (
                  <div className="col">
                    <div className="fb-box fb-ok">✅ "{trainName}" trained with 8 samples — saved locally!</div>
                    <button className="btn btn-p" onClick={() => { setTStep(0); setTName(''); setTSamp(0); }}>➕ Train Another</button>
                  </div>
                )}
              </div>

              {savedGestures.length > 0 && (
                <div className="card">
                  <div className="ctitle">💾 Saved Gestures ({savedGestures.length})</div>
                  <div className="col" style={{ gap: 5 }}>
                    {savedGestures.map((g, i) => (
                      <div key={i} className="hist-item">
                        <div style={{ fontFamily: 'var(--font-head)', fontWeight: 700 }}>🤚 {g.name}</div>
                        <div style={{ fontSize: 10, color: 'var(--text3)', marginLeft: 'auto' }}>{g.samples} samples · {g.date}</div>
                        <button className="backspace-btn" onClick={() => {
                          const ng = savedGestures.filter((_, j) => j !== i);
                          setSaved(ng);
                          localStorage.setItem('ss_gestures', JSON.stringify(ng));
                        }}>✕</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="card">
                <div className="ctitle">🔐 Privacy</div>
                <div style={{ fontSize: 12, color: 'var(--text2)', lineHeight: 1.8 }}>
                  All processing runs in your browser. No video, landmarks, or training data is ever transmitted to any server.
                </div>
              </div>
            </div>
          )}

          {/* ═══ HISTORY ═══ */}
          {page === 'history' && (
            <div className="col">
              <div className="row" style={{ flexWrap: 'wrap', gap: 7 }}>
                <div className="pill">{history.length} total detections</div>
                <button className="btn btn-s btn-sm" onClick={() => setHistory([])}>🗑 Clear</button>
                <button className="btn btn-s btn-sm" onClick={() => {
                  const t = history.map(h => `[${h.time}] ${h.letter} (${Math.round(h.conf * 100)}%) ${h.hand}`).join('\n');
                  const b = new Blob([t], { type: 'text/plain' });
                  const a = document.createElement('a');
                  a.href = URL.createObjectURL(b);
                  a.download = 'signsense_history.txt';
                  a.click();
                }}>⬇ Export</button>
              </div>
              {history.length === 0
                ? <div style={{ color: 'var(--text3)', fontSize: 13, padding: 40, textAlign: 'center' }}>
                    📂 No history yet. Start detection to build history.
                  </div>
                : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(140px,1fr))', gap: 8 }}>
                    {history.map((h, i) => {
                      const cp = Math.round(h.conf * 100);
                      return (
                        <div key={i} className="card" style={{ textAlign: 'center', padding: '12px 9px' }}>
                          <div style={{ fontFamily: 'var(--font-head)', fontSize: 46, fontWeight: 800, color: confBarColor(cp) }}>{h.letter}</div>
                          <div style={{ fontSize: 26 }}>{SIGN_EMOJI[h.letter] || ''}</div>
                          <div className="conf-bar" style={{ margin: '5px 0' }}>
                            <div className="conf-fill" style={{ width: `${cp}%`, background: confBarColor(cp) }} />
                          </div>
                          <div style={{ fontSize: 10, color: 'var(--text3)' }}>{h.hand} · {cp}%</div>
                          <div style={{ fontSize: 9, color: 'var(--text3)', marginTop: 2 }}>{h.time}</div>
                          <button className="btn btn-s btn-sm" style={{ marginTop: 6, width: '100%' }} onClick={() => speak(h.letter)}>🔊</button>
                        </div>
                      );
                    })}
                  </div>
              }
            </div>
          )}

          {/* ═══ SETTINGS ═══ */}
          {page === 'settings' && (
            <div className="set-grid">
              <div className="card">
                <div className="ctitle">🎛 Detection</div>
                <div className="set-row">
                  <div>
                    <div className="set-lbl">Sensitivity Threshold</div>
                    <div className="set-sub">Higher = stricter, fewer false positives</div>
                  </div>
                  <div className="row" style={{ gap: 7 }}>
                    <input type="range" min="30" max="95" value={sens}
                      onChange={e => setSens(+e.target.value)}
                      style={{ width: 90, accentColor: 'var(--accent)' }} />
                    <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--accent)', minWidth: 30 }}>{sens}%</span>
                  </div>
                </div>
                <div className="set-row">
                  <div>
                    <div className="set-lbl">Hand Skeleton Overlay</div>
                    <div className="set-sub">Draw joints on camera feed</div>
                  </div>
                  <button className={`toggle${overlay ? ' on' : ''}`} onClick={() => setOverlay(v => !v)} />
                </div>
                <div className="set-row">
                  <div>
                    <div className="set-lbl">Show FPS Counter</div>
                    <div className="set-sub">Frame rate display</div>
                  </div>
                  <button className={`toggle${showFps ? ' on' : ''}`} onClick={() => setShowFps(v => !v)} />
                </div>
                <div className="set-row">
                  <div>
                    <div className="set-lbl">Debug Mode</div>
                    <div className="set-sub">Show raw prediction log</div>
                  </div>
                  <button className={`toggle${debugMode ? ' on' : ''}`} onClick={() => setDebugMode(v => !v)} />
                </div>
              </div>

              <div className="card">
                <div className="ctitle">🔊 Audio & Display</div>
                <div className="set-row">
                  <div><div className="set-lbl">Text-to-Speech</div><div className="set-sub">Read detected signs aloud</div></div>
                  <button className={`toggle${ttsOn ? ' on' : ''}`} onClick={() => setTts(t => !t)} />
                </div>
                <div className="set-row">
                  <div><div className="set-lbl">High Contrast UI</div><div className="set-sub">Enhanced accessibility mode</div></div>
                  <button className={`toggle${hc ? ' on' : ''}`} onClick={() => setHc(h => !h)} />
                </div>
              </div>

              <div className="card">
                <div className="ctitle">🔐 Privacy</div>
                <div className="set-row">
                  <div><div className="set-lbl">Local Processing</div><div className="set-sub">All AI runs in browser — no data sent</div></div>
                  <button className="toggle on" disabled />
                </div>
                <div style={{ marginTop: 10, display: 'flex', gap: 7, flexWrap: 'wrap' }}>
                  <button className="btn btn-d btn-sm" onClick={() => {
                    setHistory([]);
                    setTr([]);
                    setSaved([]);
                    localStorage.clear();
                    showAlert('All data cleared', 'ok');
                  }}>🗑 Clear All Data</button>
                </div>
              </div>

              <div className="card">
                <div className="ctitle">ℹ️ About</div>
                <div style={{ fontSize: 12, color: 'var(--text2)', lineHeight: 2 }}>
                  <div>Engine: <strong style={{ color: 'var(--accent)' }}>MediaPipe Hands v0.4</strong></div>
                  <div>Recognition: <strong>Geometric landmark rules v2</strong></div>
                  <div>Smoothing: <strong>4-frame moving average</strong></div>
                  <div>Speech: Web Speech API</div>
                  <div>FPS target: <strong style={{ color: 'var(--accent3)' }}>25–30 FPS</strong></div>
                  <div>Mode: 🟢 Offline Ready</div>
                  <div>Privacy: 🔐 100% local</div>
                </div>
              </div>
            </div>
          )}

        </div>{/* /content */}
      </div>{/* /main */}

      {/* Alert Toast */}
      {alert && (
        <div className={`alert-pop ${alert.type}`} onClick={() => setAlert(null)}>
          {alert.msg}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
